<!DOCTYPE html>
<html>
<head>
<title>Smart Timetable</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>

body{
    font-family: Arial;
    margin:0;
    padding:10px;
    background:linear-gradient(135deg,#e3f2fd,#f3e5f5);
}

/* 🌙 DARK MODE */
body.dark{
    background:#121212;
    color:white;
}

body.dark .card{
    background:#1e1e1e;
    color:white;
}

body.dark .cell{
    background:#2a2a2a;
    color:white;
}

body.dark .header{
    background:#333;
}

body.dark input{
    background:#2a2a2a;
    color:white;
    border:1px solid #555;
}

/* TITLE */
h1{
    display:flex;
    justify-content:center;
    align-items:center;
    gap:10px;
    flex-wrap:wrap;
    margin-bottom:15px;
}

/* CARD */
.card{
    background:white;
    max-width:700px;
    margin:auto;
    padding:15px;
    border-radius:15px;
    box-shadow:0 10px 25px rgba(0,0,0,0.1);
}

/* INPUT */
input,select{
    width:100%;
    box-sizing:border-box;
    padding:10px;
    margin-bottom:10px;
    border:1px solid #ddd;
    border-radius:10px;
    font-size:14px;
}

/* BUTTON */
button{
    width:100%;
    padding:10px;
    border:none;
    border-radius:10px;
    cursor:pointer;
    margin-bottom:10px;
    font-size:14px;
}

.primary{
    background:#4CAF50;
    color:white;
}

.back{
    background:#f44336;
    color:white;
}

.add{
    background:#2196F3;
    color:white;
}

.editBtn{
    background:orange;
    color:white;
    border:none;
    padding:6px 10px;
    border-radius:6px;
    cursor:pointer;
}

/* TABLE */
.table{
    display:grid;
    grid-template-columns: repeat(6,minmax(80px,1fr));
    gap:8px;
    margin-top:10px;
    min-width:650px;
}

.header{
    font-weight:bold;
    background:#2196F3;
    color:white;
    padding:8px;
    border-radius:8px;
    text-align:center;
}

.cell{
    background:#f5f5f5;
    padding:8px;
    border-radius:8px;
    text-align:center;
    font-size:13px;
}

/* PAGE */
.section{
    display:none;
}

.active{
    display:block;
}

/* BADGE */
.badge{
    padding:4px 8px;
    border-radius:12px;
    font-size:12px;
    color:white;
    display:inline-block;
}

/* TYPE COLORS */
.tutorial{ background:#ff5722; }
.assignment{ background:#ffc107; color:black; }
.quiz{ background:#4caf50; }
.discussion{ background:#3f51b5; }
.project{ background:#9c27b0; }
.default{ background:#607d8b; }

/* MOBILE */
@media(max-width:768px){

    .card{
        padding:12px;
    }

    h1{
        font-size:20px;
    }

    .table{
        font-size:12px;
    }
}

</style>
</head>

<body>

<h1>
    📘 Smart Timetable

    <!-- FILTER -->
    <select id="filterType"
        onchange="applyFilter()"
        style="width:150px;padding:6px;border-radius:8px;">

        <option value="all">All Types</option>
        <option value="tutorial">Tutorial</option>
        <option value="assignment">Assignment</option>
        <option value="quiz">Quiz</option>
        <option value="discussion">Discussion</option>
        <option value="project">Project</option>
    </select>

    <!-- DARK MODE -->
    <span
        style="cursor:pointer;font-size:18px;"
        onclick="toggleDark()">🌙</span>

</h1>

<!-- SAVED PAGE -->
<div class="card section active" id="savedPage">

    <button class="add" onclick="show('formPage')">
        ➕ Add New
    </button>

    <div style="overflow-x:auto;">

        <!-- TABLE HEADER -->
        <div class="table">

            <div class="header">📅 Date</div>
            <div class="header">📆 Day</div>
            <div class="header">📚 Subject</div>
            <div class="header">📝 Type</div>
            <div class="header">⏰ Time</div>
            <div class="header">⚙️ Action</div>

        </div>

        <!-- DATA -->
        <div id="savedBox"></div>

    </div>

</div>

<!-- FORM PAGE -->
<div class="card section" id="formPage">

    <label>Date</label>
    <input type="date" id="dateInput" onchange="setDay()">

    <div id="dayBox"
        style="padding:8px;background:#eee;border-radius:8px;margin-bottom:10px;">
    </div>

    <label>Subject</label>
    <input id="subject">

    <label>Type</label>
    <input id="type" placeholder="Tutorial / Assignment">

    <label>Time</label>
    <input id="time" placeholder="1:00 - 2:00">

    <button class="primary" onclick="saveData()">
        💾 Save
    </button>

    <button class="back" onclick="show('savedPage')">
        ⬅ Back
    </button>

</div>

<script>

let savedData =
JSON.parse(localStorage.getItem("data")) || [];

let editIndex = -1;

/* PAGE */
function show(id){

    document
    .querySelectorAll(".section")
    .forEach(e=>e.classList.remove("active"));

    document
    .getElementById(id)
    .classList.add("active");
}

/* DARK MODE */
function toggleDark(){
    document.body.classList.toggle("dark");
}

/* DAY */
function setDay(){

    let d =
    new Date(document.getElementById("dateInput").value);

    let days =
    ["Sun","Mon","Tue","Wed","Thu","Fri","Sat"];

    document.getElementById("dayBox").innerText =
    days[d.getDay()];
}

/* SAVE */
function saveData(){

    let obj = {

        date:
        document.getElementById("dateInput").value,

        day:
        document.getElementById("dayBox").innerText,

        subject:
        document.getElementById("subject").value,

        type:
        document.getElementById("type").value,

        time:
        document.getElementById("time").value
    };

    if(editIndex >= 0){

        savedData[editIndex] = obj;
        editIndex = -1;

    }else{

        savedData.push(obj);
    }

    localStorage.setItem(
        "data",
        JSON.stringify(savedData)
    );

    render();

    show("savedPage");
}

/* TYPE CLASS */
function getTypeClass(type){

    type = (type || "").toLowerCase();

    if(type.includes("tutorial"))
        return "tutorial";

    if(type.includes("assignment"))
        return "assignment";

    if(type.includes("quiz"))
        return "quiz";

    if(type.includes("discussion"))
        return "discussion";

    if(type.includes("project"))
        return "project";

    return "default";
}

/* RENDER */
function render(){

    let box =
    document.getElementById("savedBox");

    box.innerHTML = "";

    let filter =
    document.getElementById("filterType").value;

    savedData
    .sort((a,b)=>
        new Date(a.date)-new Date(b.date)
    )

    .map((d,index)=>({d,index}))

    .filter(item=>{

        if(filter === "all")
            return true;

        return getTypeClass(item.d.type) === filter;
    })

    .forEach(item=>{

        let d = item.d;
        let i = item.index;

        box.innerHTML += `

        <div class="table">

            <div class="cell">${d.date}</div>

            <div class="cell">${d.day}</div>

            <div class="cell">${d.subject}</div>

            <div class="cell">
                <span class="badge ${getTypeClass(d.type)}">
                    ${d.type}
                </span>
            </div>

            <div class="cell">${d.time}</div>

            <div class="cell">
                <button class="editBtn"
                    onclick="editData(${i})">
                    Edit
                </button>
            </div>

        </div>
        `;
    });
}

/* FILTER */
function applyFilter(){
    render();
}

/* EDIT */
function editData(i){

    let d = savedData[i];

    document.getElementById("dateInput").value =
    d.date;

    document.getElementById("subject").value =
    d.subject;

    document.getElementById("type").value =
    d.type;

    document.getElementById("time").value =
    d.time;

    setDay();

    editIndex = i;

    show("formPage");
}

/* START */
render();

</script>

</body>
</html>
