<!DOCTYPE html>
<html>
<head>
<title>Smart Timetable</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>

body{
    font-family: Arial;
    margin:0;
    background:linear-gradient(135deg,#e3f2fd,#f3e5f5);
}

/* 🌙 DARK MODE */
body.dark{
    background:#121212;
    color:white;
}

body.dark .card{
    background:#1e1e1e;
    color:white;
}

body.dark .cell{
    background:#2a2a2a;
    color:white;
}

body.dark .header{
    background:#333;
}

h1{
    text-align:center;
    padding:15px;
    margin:0;
    gap:10px;
}

/* CARD */
.card{
    background:white;
    max-width:600px;
    margin:10px auto;
    padding:15px;
    border-radius:15px;
    box-shadow:0 10px 25px rgba(0,0,0,0.1);
}

/* INPUT */
input,select{
    width:580px;
    padding:10px;
    margin-bottom:10px;
    border:1px solid #ddd;
    border-radius:10px;
}

/* BUTTON */
button{
    width:100%;
    padding:10px;
    border:none;
    border-radius:10px;
    cursor:pointer;
    margin-bottom:10px; /* ⭐ ဒီဟာထည့်လိုက် */
}

.primary{background:#4CAF50;color:white;}
.back{background:#f44336;color:white;}
.add{background:#2196F3;color:white;}
.darkBtn{background:#333;color:white;}

/* TABLE STYLE */
.table{
    display:grid;
    grid-template-columns: 1fr 1fr 1fr 1fr 1fr 80px;
    gap:8px;
    margin-top:10px;
}

.header{
    font-weight:bold;
    background:#2196F3;
    color:white;
    padding:8px;
    border-radius:8px;
    text-align:center;
}

.cell{
    background:#f5f5f5;
    padding:8px;
    border-radius:8px;
    text-align:center;
    font-size:13px;
}

/* EDIT */
.editBtn{
    background:orange;
    color:white;
    border:none;
    padding:5px;
    border-radius:6px;
    cursor:pointer;
}

body.dark{
    background:#121212;
    color:white;
}

body.dark .card{
    background:#1e1e1e;
    color:white;
}

body.dark .cell{
    background:#2a2a2a;
    color:white;
}

body.dark .header{
    background:#333;
}

/* PAGE */
.section{display:none;}
.active{display:block;}

.badge{
    padding:4px 8px;
    border-radius:12px;
    font-size:12px;
    color:white;
    display:inline-block;
}

/* Type colors */
.tutorial{ background:#d22f0a; }
.assignment{ background:#dae50e; }
.quiz{ background:#07de3d; }
.discussion{ background:#2304d6; }
.default{ background:#9b0396; }
</style>
</head>

<body>

<h1 style="display:flex;justify-content:right;align-items:center;gap:12px;">
    📘 Smart Timetable
    <p><div style="display:flex;justify-content:flex-end;margin:10px 0;">
    <select id="filterType" onchange="applyFilter()" style="width:150px;padding:8px;border-radius:8px;">
        <option value="all">All Types</option>
        <option value="tutorial">Tutorial</option>
        <option value="assignment">Assignment</option>
        <option value="quiz">Quiz</option>
        <option value="discussion">Discussion</option>
        <option value="project">Project</option>
    </select>
</div></p>
    <span style="cursor:pointer;font-size:18px;margin-left:40px;margin-right: 350px;" onclick="toggleDark()">🌙</span>
</h1>


<!-- SAVED -->
<div class="card section active" id="savedPage">

    <button class="add" onclick="show('formPage')">➕ Add New</button>

    <div class="table">
        <div class="header">📅 Date</div>
        <div class="header">📆 Day</div>
        <div class="header">📚 Subject</div>
        <div class="header">📝 Type</div>
        <div class="header">⏰ Time</div>
        <div class="header">⚙️ Action</div>
    </div>

    <div id="savedBox"></div>

</div>

<!-- FORM -->
<div class="card section" id="formPage">

    <label>Date</label>
    <input type="date" id="dateInput" onchange="setDay()">

    <div id="dayBox" style="padding:8px;background:#eee;border-radius:8px;margin-bottom:10px;"></div>

    <label>Subject</label>
    <input id="subject">

    <label>Type</label>
    <input id="type">

    <label>Time</label>
    <input id="time" placeholder="1:00 - 2:00">

    <button class="primary" onclick="saveData()">💾 Save</button><br>
    <button class="back" onclick="show('savedPage')">⬅ Back</button>
</div>

<script>

function toggleDark(){
    document.body.classList.toggle("dark");
}

let savedData = JSON.parse(localStorage.getItem("data")) || [];
let editIndex = -1;

/* PAGE */
function show(id){
    document.querySelectorAll(".section").forEach(e=>e.classList.remove("active"));
    document.getElementById(id).classList.add("active");
}

/* 🌙 DARK MODE */
function toggleDark(){
    document.body.classList.toggle("dark");
}

/* DAY */
function setDay(){
    let d = new Date(document.getElementById("dateInput").value);
    let days=["Sun","Mon","Tue","Wed","Thu","Fri","Sat"];
    document.getElementById("dayBox").innerText = days[d.getDay()];
}

/* SAVE */
function saveData(){

    let obj = {
        date: document.getElementById("dateInput").value,
        day: document.getElementById("dayBox").innerText,
        subject: document.getElementById("subject").value,
        type: document.getElementById("type").value,
        time: document.getElementById("time").value
    };

    if(editIndex >= 0){
        savedData[editIndex] = obj;
        editIndex = -1;
    }else{
        savedData.push(obj);
    }

    localStorage.setItem("data", JSON.stringify(savedData));

    render();
    show('savedPage');
}

/* RENDER */
function render(){

    let box = document.getElementById("savedBox");
    box.innerHTML = "";

    let filter = document.getElementById("filterType")?.value || "all";

    savedData
    .sort((a,b)=> new Date(a.date)-new Date(b.date))
    .map((d, index) => ({ d, index }))   // keep original index
    .filter(item => {
        if(filter === "all") return true;
        return getTypeClass(item.d.type) === filter;
    })
    .forEach(item => {

        let d = item.d;
        let i = item.index;

        box.innerHTML += `
        <div class="table">

            <div class="cell">${d.date}</div>
            <div class="cell">${d.day}</div>
            <div class="cell">${d.subject}</div>

            <div class="cell">
                <span class="badge ${getTypeClass(d.type)}">${d.type}</span>
            </div>

            <div class="cell">${d.time}</div>

            <div class="cell">
                <button class="editBtn" onclick="editData(${i})">Edit</button>
            </div>

        </div>
        `;
    });
}

/* EDIT */
function editData(i){

    let d = savedData[i];

    document.getElementById("dateInput").value = d.date;
    document.getElementById("subject").value = d.subject;
    document.getElementById("type").value = d.type;
    document.getElementById("time").value = d.time;

    setDay();

    editIndex = i;
    show('formPage');
}

render();

function getTypeClass(type){

    type = (type || "").toLowerCase();

    if(type.includes("tutorial")) return "tutorial";
    if(type.includes("assignment")) return "assignment";
    if(type.includes("quiz")) return "quiz";
    if(type.includes("discussion")) return "discussion";

    return "default";
}
function applyFilter(){
    render();
}

</script>

</body>
</html>
