<!DOCTYPE html>
<html>
<head>
<title>Smart Timetable</title>

<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>

*{
    box-sizing:border-box;
}

body{
    font-family:Arial;
    margin:0;
    background:linear-gradient(135deg,#e3f2fd,#f3e5f5);
}

/* DARK MODE */
body.dark{
    background:#121212;
    color:white;
}

body.dark .card{
    background:#1e1e1e;
    color:white;
}

body.dark .cell{
    background:#2a2a2a;
    color:white;
}

body.dark .header{
    background:#333;
}

body.dark input,
body.dark select{
    background:#2a2a2a;
    color:white;
    border:1px solid #555;
}

/* TITLE */
.topBar{
    display:flex;
    justify-content:center;
    align-items:center;
    gap:15px;
    padding:20px;
    flex-wrap:wrap;
}

h1{
    margin:0;
    font-size:40px;
}

/* FILTER */
#filterType{
    width:150px;
    padding:8px;
    border-radius:10px;
    border:1px solid #ddd;
}

/* DARK BUTTON */
.darkToggle{
    cursor:pointer;
    font-size:24px;
}

/* CARD */
.card{
    background:white;
    width:95%;
    max-width:1000px;
    margin:auto;
    padding:15px;
    border-radius:20px;
    box-shadow:0 10px 25px rgba(0,0,0,0.1);
}

/* INPUT */
input,select{
    width:100%;
    padding:12px;
    margin-bottom:12px;
    border:1px solid #ddd;
    border-radius:10px;
    font-size:15px;
}

/* BUTTON */
button{
    width:100%;
    padding:12px;
    border:none;
    border-radius:10px;
    cursor:pointer;
    font-size:15px;
    margin-bottom:10px;
}

.add{
    background:#2196F3;
    color:white;
}

.primary{
    background:#4CAF50;
    color:white;
}

.back{
    background:#f44336;
    color:white;
}

.editBtn{
    background:#d08b1f;
    color:white;
    padding:6px 12px;
    border:none;
    border-radius:8px;
    cursor:pointer;
    width:auto;
}

/* TABLE */
.table{
    display:grid;

    grid-template-columns:
    1.2fr
    0.7fr
    1.2fr
    1fr
    1fr
    0.8fr;

    gap:6px;
    margin-top:8px;
    align-items:center;
}

/* HEADER */
.header{
    background:#1e88e5;
    color:white;
    font-weight:bold;
    text-align:center;
    padding:10px 6px;
    border-radius:10px;
    font-size:14px;
}

/* CELL */
.cell{
    background:#f5f5f5;
    text-align:center;
    padding:10px 6px;
    border-radius:10px;
    font-size:13px;

    overflow:hidden;
    text-overflow:ellipsis;
    white-space:nowrap;
}

/* PAGE */
.section{
    display:none;
}

.active{
    display:block;
}

/* BADGE */
.badge{
    padding:4px 8px;
    border-radius:12px;
    font-size:12px;
    color:white;
    display:inline-block;
}

.tutorial{ background:#d22f0a; }
.assignment{ background:#c8b400; }
.quiz{ background:#0c9f35; }
.discussion{ background:#2304d6; }
.default{ background:#9b0396; }

/* MOBILE */
@media(max-width:700px){

    .topBar{
        justify-content:space-between;
        padding:15px;
    }

    h1{
        font-size:24px;
    }

    #filterType{
        width:120px;
        font-size:12px;
    }

    .darkToggle{
        font-size:20px;
    }

    .card{
        width:96%;
        padding:10px;
    }

    .table{
        grid-template-columns:
        80px
        50px
        90px
        80px
        80px
        70px;

        overflow-x:auto;
        gap:5px;
    }

    .header{
        font-size:11px;
        padding:8px 4px;
    }

    .cell{
        font-size:11px;
        padding:8px 4px;
    }

    .editBtn{
        font-size:10px;
        padding:5px 8px;
    }

    .badge{
        font-size:10px;
        padding:3px 6px;
    }
}

</style>
</head>

<body>

<!-- TOP -->
<div class="topBar">

    <h1>📱 Smart Timetable</h1>

    <select id="filterType" onchange="applyFilter()">
        <option value="all">All Types</option>
        <option value="tutorial">Tutorial</option>
        <option value="assignment">Assignment</option>
        <option value="quiz">Quiz</option>
        <option value="discussion">Discussion</option>
    </select>

    <span class="darkToggle" onclick="toggleDark()">🌙</span>

</div>

<!-- SAVED PAGE -->
<div class="card section active" id="savedPage">

    <button class="add" onclick="show('formPage')">
        ➕ Add New
    </button>

    <!-- HEADER -->
    <div class="table">

        <div class="header">📅 Date</div>
        <div class="header">📆 Day</div>
        <div class="header">📚 Subject</div>
        <div class="header">📝 Type</div>
        <div class="header">⏰ Time</div>
        <div class="header">⚙️ Action</div>

    </div>

    <div id="savedBox"></div>

</div>

<!-- FORM PAGE -->
<div class="card section" id="formPage">

    <label>Date</label>
    <input type="date" id="dateInput" onchange="setDay()">

    <div id="dayBox"
    style="
    padding:10px;
    background:#eee;
    border-radius:10px;
    margin-bottom:10px;
    ">
    </div>

    <label>Subject</label>
    <input id="subject">

    <label>Type</label>
    <input id="type">

    <label>Time</label>
    <input id="time" placeholder="1:00 - 2:00">

    <button class="primary" onclick="saveData()">
        💾 Save
    </button>

    <button class="back" onclick="show('savedPage')">
        ⬅ Back
    </button>

</div>

<script>

let savedData =
JSON.parse(localStorage.getItem("data")) || [];

let editIndex = -1;

/* PAGE */
function show(id){

    document
    .querySelectorAll(".section")
    .forEach(e=>e.classList.remove("active"));

    document
    .getElementById(id)
    .classList.add("active");
}

/* DARK */
function toggleDark(){
    document.body.classList.toggle("dark");
}

/* DAY */
function setDay(){

    let d =
    new Date(
    document.getElementById("dateInput").value
    );

    let days =
    ["Sun","Mon","Tue","Wed","Thu","Fri","Sat"];

    document.getElementById("dayBox").innerText =
    days[d.getDay()];
}

/* SAVE */
function saveData(){

    let obj = {

        date:
        document.getElementById("dateInput").value,

        day:
        document.getElementById("dayBox").innerText,

        subject:
        document.getElementById("subject").value,

        type:
        document.getElementById("type").value,

        time:
        document.getElementById("time").value
    };

    if(editIndex >= 0){

        savedData[editIndex] = obj;
        editIndex = -1;

    }else{

        savedData.push(obj);
    }

    localStorage.setItem(
    "data",
    JSON.stringify(savedData)
    );

    render();

    show("savedPage");
}

/* FILTER */
function applyFilter(){
    render();
}

/* TYPE COLOR */
function getTypeClass(type){

    type = (type || "").toLowerCase();

    if(type.includes("tutorial"))
    return "tutorial";

    if(type.includes("assignment"))
    return "assignment";

    if(type.includes("quiz"))
    return "quiz";

    if(type.includes("discussion"))
    return "discussion";

    return "default";
}

/* RENDER */
function render(){

    let box =
    document.getElementById("savedBox");

    box.innerHTML = "";

    savedData.sort((a,b)=>
    new Date(a.date)-new Date(b.date)
    );

    let filter =
    document.getElementById("filterType").value;

    savedData
    .filter(d=>{

        if(filter==="all") return true;

        return getTypeClass(d.type)===filter;

    })

    .forEach((d,i)=>{

        box.innerHTML += `

        <div class="table">

            <div class="cell">
                ${d.date}
            </div>

            <div class="cell">
                ${d.day}
            </div>

            <div class="cell">
                ${d.subject}
            </div>

            <div class="cell">
                <span class="badge ${getTypeClass(d.type)}">
                    ${d.type}
                </span>
            </div>

            <div class="cell">
                ${d.time}
            </div>

            <div class="cell">
                <button class="editBtn"
                onclick="editData(${i})">
                    Edit
                </button>
            </div>

        </div>

        `;
    });
}

/* EDIT */
function editData(i){

    let d = savedData[i];

    document.getElementById("dateInput").value =
    d.date;

    document.getElementById("subject").value =
    d.subject;

    document.getElementById("type").value =
    d.type;

    document.getElementById("time").value =
    d.time;

    setDay();

    editIndex = i;

    show("formPage");
}

/* AUTO DELETE AFTER 4PM */
function autoDeleteOldData(){

    let now = new Date();

    savedData = savedData.filter(item=>{

        let itemDate = new Date(item.date);

        itemDate.setHours(16,0,0,0);

        return now < itemDate;
    });

    localStorage.setItem(
    "data",
    JSON.stringify(savedData)
    );
}

autoDeleteOldData();

render();

</script>

</body>
</html>
